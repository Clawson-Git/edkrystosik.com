app = 'edkrystosik-com'
primary_region = 'sjc'

[build]

[env]
  PORT = '3001'
  DATA_DIR = '/data'

[mounts]
  source = 'notes_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = '5s'
  interval = '30s'
  method = 'GET'
  timeout = '5s'
  path = '/api/notes'
